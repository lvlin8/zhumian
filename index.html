<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>温馨助眠答题 - 第三版</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'HarmonyOS Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #fbe9e7;
      background-image: radial-gradient(circle at 20% 30%, #fff3e0 0%, #f8bbd0 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      color: #5d4037;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 245, 238, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 24px 20px;
      box-shadow: 0 20px 40px rgba(180, 120, 100, 0.25), inset 0 1px 0 rgba(255,255,255,0.8);
      border: 1px solid rgba(255, 220, 200, 0.7);
    }
    h1 {
      text-align: center;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: 2px;
      color: #bf5b4c;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      background: rgba(255,255,255,0.6);
      padding: 10px 14px;
      border-radius: 18px;
    }
    .setting-row label {
      font-size: 16px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .setting-row input {
      width: 70px;
      padding: 8px 10px;
      border: 1px solid #e0c0b0;
      border-radius: 12px;
      background: #fff9f5;
      font-size: 18px;
      text-align: center;
      color: #5d4037;
      outline: none;
      transition: 0.2s;
    }
    .setting-row input:focus {
      border-color: #ff8a65;
      box-shadow: 0 0 0 3px rgba(255,138,101,0.2);
    }
    .toggle-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      margin: 16px 0 12px;
    }
    .toggle-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.6);
      padding: 8px 14px;
      border-radius: 24px;
    }
    .toggle-item span {
      font-size: 15px;
    }
    /* 拨动开关 */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #d7ccc8;
      transition: .3s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px; width: 18px;
      left: 3px; bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #ff8a65;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    .current-status {
      background: rgba(255,255,255,0.7);
      border-radius: 18px;
      padding: 14px;
      margin: 16px 0;
      text-align: center;
      font-size: 24px;
      font-weight: 500;
      color: #8d6e63;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 10px;
    }
    .btn {
      background: #ffab91;
      border: none;
      padding: 14px 28px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: 500;
      color: white;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #ff9e80, #ff6e40);
      box-shadow: 0 6px 14px rgba(255,110,64,0.4);
      transition: 0.2s;
      cursor: pointer;
      flex: 1;
      text-align: center;
    }
    .btn:active {
      transform: scale(0.96);
      box-shadow: 0 3px 8px rgba(255,110,64,0.3);
    }
    .btn.stop {
      background: #bcaaa4;
      background: linear-gradient(135deg, #bcaaa4, #8d7b75);
      box-shadow: 0 4px 10px rgba(141,123,117,0.3);
    }
  </style>
</head>
<body>
<div class="card">
  <h1>🌙 晚安答题</h1>

  <!-- 等待秒数设置 -->
  <div class="setting-row">
    <label>⏳ 播报后等待秒数</label>
    <input type="number" id="waitFirst" value="15" min="3" max="60" onfocus="this.select()">
  </div>
  <div class="setting-row">
    <label>💤 继续等待秒数</label>
    <input type="number" id="waitSecond" value="10" min="3" max="60" onfocus="this.select()">
  </div>

  <!-- 十位数范围开关 -->
  <div class="toggle-group">
    <div class="toggle-item">
      <span>➕加法·十位</span>
      <label class="switch">
        <input type="checkbox" id="addTen" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-item">
      <span>➖减法·十位</span>
      <label class="switch">
        <input type="checkbox" id="subTen" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-item">
      <span>✖️乘法·十位</span>
      <label class="switch">
        <input type="checkbox" id="mulTen" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-item">
      <span>➗除法·十位</span>
      <label class="switch">
        <input type="checkbox" id="divTen" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <!-- 当前题目/状态显示 -->
  <div class="current-status" id="statusBox">点击下方开始</div>

  <div class="buttons">
    <button class="btn" id="startBtn">🌿 开始出题</button>
    <button class="btn stop" id="stopBtn">🛌 我要睡了</button>
  </div>
</div>

<script>
  (function() {
    // ---------- DOM 元素 ----------
    const waitFirstInput = document.getElementById('waitFirst');
    const waitSecondInput = document.getElementById('waitSecond');
    const addTenCheck = document.getElementById('addTen');
    const subTenCheck = document.getElementById('subTen');
    const mulTenCheck = document.getElementById('mulTen');
    const divTenCheck = document.getElementById('divTen');
    const statusBox = document.getElementById('statusBox');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');

    // ---------- 屏幕常亮相关 ----------
    let wakeLock = null;
    let wakeLockSupported = false;

    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        wakeLockSupported = true;
        try {
          wakeLock = await navigator.wakeLock.request('screen');
          console.log('屏幕常亮已激活');
          wakeLock.addEventListener('release', () => {
            console.log('屏幕常亮已释放');
            wakeLock = null;
          });
        } catch (err) {
          console.log('无法获取屏幕常亮锁:', err);
          wakeLock = null;
        }
      } else {
        console.log('当前浏览器不支持屏幕常亮 API');
      }
    }

    async function releaseWakeLock() {
      if (wakeLock) {
        try {
          await wakeLock.release();
          wakeLock = null;
          console.log('屏幕常亮锁已手动释放');
        } catch (err) {
          console.log('释放屏幕常亮锁失败:', err);
        }
      }
    }

    document.addEventListener('visibilitychange', async () => {
      if (document.visibilityState === 'visible' && quizRunning && wakeLockSupported && !wakeLock) {
        await requestWakeLock();
      }
    });

    // ---------- 语音相关 ----------
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let synth = window.speechSynthesis;
    let speaking = false;
    let listening = false;
    let activeTimers = [];

    let currentQuestion = { text: '', answer: null };
    let quizRunning = false;
    let sleepCheckStage = 0;

    const casualBeforeNext = [
      "嗯，我看看还有什么题目……",
      "等一下哦，我想想下一题。",
      "这题对了呢。",
      "这题不对呀。",
      "咱们继续吧。",
      "再来一题简单点的。",
      "慢慢来，不着急。",
      "答得不错嘛。",
      "咦，还真有点困了……",
    ];

    // ---------- 工具函数 ----------
    function clearAllTimers() {
      activeTimers.forEach(t => clearTimeout(t));
      activeTimers = [];
    }

    function saveSettings() {
      localStorage.setItem('sleepQuiz_waitFirst', waitFirstInput.value);
      localStorage.setItem('sleepQuiz_waitSecond', waitSecondInput.value);
      localStorage.setItem('sleepQuiz_addTen', addTenCheck.checked);
      localStorage.setItem('sleepQuiz_subTen', subTenCheck.checked);
      localStorage.setItem('sleepQuiz_mulTen', mulTenCheck.checked);
      localStorage.setItem('sleepQuiz_divTen', divTenCheck.checked);
    }

    function loadSettings() {
      const wf = localStorage.getItem('sleepQuiz_waitFirst');
      const ws = localStorage.getItem('sleepQuiz_waitSecond');
      if (wf) waitFirstInput.value = wf;
      if (ws) waitSecondInput.value = ws;
      addTenCheck.checked = localStorage.getItem('sleepQuiz_addTen') !== 'false';
      subTenCheck.checked = localStorage.getItem('sleepQuiz_subTen') !== 'false';
      mulTenCheck.checked = localStorage.getItem('sleepQuiz_mulTen') !== 'false';
      divTenCheck.checked = localStorage.getItem('sleepQuiz_divTen') !== 'false';
    }

    [waitFirstInput, waitSecondInput, addTenCheck, subTenCheck, mulTenCheck, divTenCheck].forEach(el => {
      el.addEventListener('change', saveSettings);
      el.addEventListener('input', saveSettings);
    });

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function generateQuestion() {
      const ops = ['+', '-', '*', '/'];
      const op = ops[rand(0, ops.length - 1)];
      let a, b, answer, textOp, textQuestion;

      const addMax = addTenCheck.checked ? 99 : 9;
      const subMax = subTenCheck.checked ? 99 : 9;
      const mulMax = mulTenCheck.checked ? 99 : 9;
      const divMax = divTenCheck.checked ? 99 : 9;

      switch (op) {
        case '+':
          a = rand(1, addMax);
          b = rand(1, addMax);
          answer = a + b;
          textOp = '加';
          break;
        case '-':
          a = rand(1, subMax);
          b = rand(1, subMax);
          if (a < b) [a, b] = [b, a];
          answer = a - b;
          textOp = '减';
          break;
        case '*':
          a = rand(1, mulMax);
          b = rand(1, mulTenCheck.checked ? 20 : 9);
          answer = a * b;
          textOp = '乘';
          break;
        case '/':
          b = rand(1, divTenCheck.checked ? 20 : 9);
          answer = rand(1, divTenCheck.checked ? 20 : 9);
          a = b * answer;
          textOp = '除以';
          break;
      }

      textQuestion = `${a} ${textOp} ${b} 等于多少？`;
      return { text: textQuestion, answer: answer };
    }

    // 语音播报（所有参数恢复为第一版的慵懒风格）
    function speak(text, callback, rate = 0.9, pitch = 1.0) {
      if (!synth) {
        if (callback) callback();
        return;
      }
      synth.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'zh-CN';
      utter.rate = rate;
      utter.pitch = pitch;
      utter.volume = 1;
      utter.onend = () => {
        speaking = false;
        if (callback) callback();
      };
      utter.onerror = (e) => {
        speaking = false;
        if (callback) callback();
      };
      speaking = true;
      synth.speak(utter);
    }

    function startListening(onResult, onTimeout, timeoutMs) {
      if (!SpeechRecognition) {
        statusBox.innerText = '⚠️ 当前浏览器不支持语音识别';
        return;
      }
      if (recognition) {
        try { recognition.abort(); } catch(e){}
      }
      recognition = new SpeechRecognition();
      recognition.lang = 'zh-CN';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      recognition.continuous = false;

      let timeoutId = setTimeout(() => {
        if (listening) {
          try { recognition.stop(); } catch(e){}
          listening = false;
          if (onTimeout) onTimeout();
        }
      }, timeoutMs);

      recognition.onresult = (event) => {
        clearTimeout(timeoutId);
        const transcript = event.results[0][0].transcript.trim();
        listening = false;
        if (onResult) onResult(transcript);
      };

      recognition.onerror = (event) => {
        clearTimeout(timeoutId);
        listening = false;
        if (event.error === 'no-speech' || event.error === 'aborted') {
          if (onTimeout) onTimeout();
        } else {
          statusBox.innerText = '🎤 麦克风有点问题，请重试';
        }
      };

      recognition.onend = () => {
        listening = false;
      };

      try {
        recognition.start();
        listening = true;
      } catch (e) {
        listening = false;
        statusBox.innerText = '无法启动语音识别';
      }
    }

    function stopListening() {
      if (recognition && listening) {
        try { recognition.abort(); } catch(e){}
        listening = false;
      }
    }

    function extractNumber(text) {
      const match = text.match(/\d+/);
      return match ? parseInt(match[0], 10) : null;
    }

    function lockScreenAndExit() {
      speak('晚安，好好休息吧。', async () => {
        await releaseWakeLock();
        setTimeout(() => {
          window.close();
          if (!window.closed) {
            window.location.href = 'about:blank';
          }
        }, 500);
      }, 0.8, 0.9); // 第一版晚安语速
      quizRunning = false;
      stopListening();
      clearAllTimers();
      statusBox.innerText = '🌜 晚安~';
    }

    function handleSleepCheck() {
      if (!quizRunning) return;
      const waitFirst = parseInt(waitFirstInput.value, 10) || 15;
      const waitSecond = parseInt(waitSecondInput.value, 10) || 10;

      if (sleepCheckStage === 0) {
        sleepCheckStage = 1;
        statusBox.innerText = '💭 嗯？睡着了吗？';
        const phrases = ['睡着了吗？', '还在听吗？', '是不是困啦？'];
        const phrase = phrases[rand(0, phrases.length-1)];
        speak(phrase, () => {
          if (!quizRunning) return;
          startListening(
            (transcript) => {
              const num = extractNumber(transcript);
              if (num !== null && currentQuestion.answer !== null) {
                checkAnswer(num);
              } else {
                speak('哦，那我们继续吧。', () => {
                  if(quizRunning) nextQuestion();
                }, 0.9, 1.0);
              }
              sleepCheckStage = 0;
            },
            () => {
              lockScreenAndExit();
            },
            waitSecond * 1000
          );
        }, 0.85, 0.95); // 第一版问句语速
      }
    }

    function checkAnswer(userAnswer) {
      if (!quizRunning) return;
      const correct = (userAnswer === currentQuestion.answer);
      let feedback = '';
      if (correct) {
        const goods = ['对啦。', '答对了。', '正确。', '嗯，没错。'];
        feedback = goods[rand(0, goods.length-1)];
      } else {
        feedback = `不对哦，答案是 ${currentQuestion.answer}。`;
      }
      statusBox.innerText = feedback;
      speak(feedback, () => {
        if (!quizRunning) return;
        if (Math.random() < 0.6) {
          const casual = casualBeforeNext[rand(0, casualBeforeNext.length-1)];
          speak(casual, () => {
            if(quizRunning) nextQuestion();
          }, 0.9, 1.0); // 第一版闲聊语速
        } else {
          nextQuestion();
        }
      }, 0.9, 1.0); // 第一版反馈语速
    }

    function nextQuestion() {
      if (!quizRunning) return;
      sleepCheckStage = 0;
      currentQuestion = generateQuestion();
      statusBox.innerText = currentQuestion.text;
      speak(currentQuestion.text, () => {
        if (!quizRunning) return;
        const waitFirst = parseInt(waitFirstInput.value, 10) || 15;
        startListening(
          (transcript) => {
            const num = extractNumber(transcript);
            if (num !== null) {
              checkAnswer(num);
            } else {
              speak('我没听清数字，再说一遍好吗？', () => {
                if (!quizRunning) return;
                startListening(
                  (t2) => {
                    const n2 = extractNumber(t2);
                    if (n2 !== null) checkAnswer(n2);
                    else {
                      speak('还是没听清，我们看下一题吧。', () => { if(quizRunning) nextQuestion(); }, 0.9, 1.0);
                    }
                  },
                  () => handleSleepCheck(),
                  waitFirst * 1000
                );
              }, 0.9, 1.0);
            }
          },
          () => handleSleepCheck(),
          waitFirst * 1000
        );
      }, 0.85, 0.95); // 第一版题目播报语速
    }

    async function startQuiz() {
      if (quizRunning) return;
      if (!SpeechRecognition) {
        statusBox.innerText = '⚠️ 浏览器不支持语音，请用华为浏览器打开';
        return;
      }
      if (!synth) {
        statusBox.innerText = '语音播报不可用';
        return;
      }
      quizRunning = true;
      sleepCheckStage = 0;
      saveSettings();
      statusBox.innerText = '准备开始咯……';

      await requestWakeLock();

      // 用第一版慵懒语调说出新的开场白
      speak('我们来玩个睡前小游戏吧。', () => {
        nextQuestion();
      }, 0.9, 0.95); // 和第一版开场白语调一致
    }

    async function stopQuiz() {
      quizRunning = false;
      stopListening();
      clearAllTimers();
      synth.cancel();
      await releaseWakeLock();
      statusBox.innerText = '已停止，睡吧🌙';
    }

    startBtn.addEventListener('click', () => {
      if (quizRunning) {
        stopQuiz();
      }
      startQuiz();
    });

    stopBtn.addEventListener('click', () => {
      if (quizRunning) {
        stopQuiz();
        lockScreenAndExit();
      } else {
        speak('晚安，做个好梦。', async () => {
          await releaseWakeLock();
          window.close();
          if(!window.closed) window.location.href = 'about:blank';
        }, 0.8, 0.9);
      }
    });

    loadSettings();

    window.addEventListener('beforeunload', () => {
      stopListening();
      synth.cancel();
      releaseWakeLock();
    });
  })();
</script>
</body>
</html>
