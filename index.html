<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>温馨助眠答题 - 华为/安卓优化版</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'HarmonyOS Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #fbe9e7; 
    background-image: radial-gradient(circle at 20% 30%, #fff3e0 0%, #f8bbd0 100%); 
    min-height: 100vh; 
    display: flex; justify-content: center; align-items: center; 
    padding: 16px; color: #5d4037; 
  }
  .card { 
    width: 100%; max-width: 420px; 
    background: rgba(255, 245, 238, 0.85); 
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
    border-radius: 32px; padding: 24px 20px; 
    box-shadow: 0 20px 40px rgba(180, 120, 100, 0.25), inset 0 1px 0 rgba(255,255,255,0.8); 
    border: 1px solid rgba(255, 220, 200, 0.7); 
  }
  h1 { text-align: center; font-size: 28px; font-weight: 400; letter-spacing: 2px; color: #bf5b4c; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; background: rgba(255,255,255,0.6); padding: 10px 14px; border-radius: 18px; }
  .setting-row label { font-size: 16px; font-weight: 500; flex-shrink: 0; }
  .setting-row input { width: 70px; padding: 8px 10px; border: 1px solid #e0c0b0; border-radius: 12px; background: #fff9f5; font-size: 18px; text-align: center; color: #5d4037; outline: none; transition: 0.2s; }
  .range-section { background: rgba(255,255,255,0.6); border-radius: 18px; padding: 12px 14px; margin-bottom: 14px; }
  .range-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .range-row span { font-size: 16px; font-weight: 500; flex-shrink: 0; width: 60px; }
  .segmented { display: flex; gap: 4px; background: rgba(210, 180, 170, 0.3); border-radius: 20px; padding: 3px; }
  .seg-btn { border: none; background: transparent; padding: 6px 14px; border-radius: 18px; font-size: 14px; font-weight: 500; color: #8d6e63; cursor: pointer; transition: 0.2s; outline: none; white-space: nowrap; }
  .seg-btn.active { background: #ff8a65; color: white; box-shadow: 0 2px 6px rgba(255,138,101,0.3); }
  .current-status { 
    background: rgba(255,255,255,0.7); border-radius: 18px; padding: 14px; margin: 16px 0; text-align: center; font-size: 24px; font-weight: 500; color: #8d6e63; min-height: 60px; 
    display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); 
    flex-direction: column; gap: 5px; /* 支持多行文字 */
  }
  .btn { 
    background: linear-gradient(135deg, #ff9e80, #ff6e40); 
    border: none; padding: 14px 28px; border-radius: 30px; font-size: 18px; font-weight: 500; color: white; letter-spacing: 1px; 
    box-shadow: 0 6px 14px rgba(255,110,64,0.4); transition: 0.2s; cursor: pointer; flex: 1; text-align: center; 
  }
  .btn.stop { background: linear-gradient(135deg, #bcaaa4, #8d7b75); box-shadow: 0 4px 10px rgba(141,123,117,0.3); }
</style>
</head>
<body>
<div class="card">
  <h1>🌙 晚安答题 (优化版)</h1>
  <div class="setting-row">
    <label>⏳ 播报后等待秒数</label>
    <input type="number" id="waitFirst" value="15" min="3" max="60">
  </div>
  <div class="setting-row">
    <label>💤 继续等待秒数</label>
    <input type="number" id="waitSecond" value="10" min="3" max="60">
  </div>
  <div class="range-section">
    <div class="range-row"><span>➕加法</span><div class="segmented" id="addRange"><button class="seg-btn" data-value="single">个位</button><button class="seg-btn active" data-value="mixed">混合</button><button class="seg-btn" data-value="double">十位</button></div></div>
    <div class="range-row"><span>➖减法</span><div class="segmented" id="subRange"><button class="seg-btn" data-value="single">个位</button><button class="seg-btn active" data-value="mixed">混合</button><button class="seg-btn" data-value="double">十位</button></div></div>
    <div class="range-row"><span>✖️乘法</span><div class="segmented" id="mulRange"><button class="seg-btn" data-value="single">个位</button><button class="seg-btn active" data-value="mixed">混合</button><button class="seg-btn" data-value="double">十位</button></div></div>
    <div class="range-row"><span>➗除法</span><div class="segmented" id="divRange"><button class="seg-btn" data-value="single">个位</button><button class="seg-btn active" data-value="mixed">混合</button><button class="seg-btn" data-value="double">十位</button></div></div>
  </div>
  <div class="current-status" id="statusBox">点击下方开始</div>
  <div style="display: flex; gap: 12px; justify-content: center; margin-top: 10px;">
    <button class="btn" id="startBtn">🌿 开始出题</button>
    <button class="btn stop" id="stopBtn">🛌 我要睡了</button>
  </div>
</div>

<script>
(function() {
  // DOM 元素获取
  const waitFirstInput = document.getElementById('waitFirst');
  const waitSecondInput = document.getElementById('waitSecond');
  const statusBox = document.getElementById('statusBox');
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  
  // 运算范围容器
  const addRange = document.getElementById('addRange');
  const subRange = document.getElementById('subRange');
  const mulRange = document.getElementById('mulRange');
  const divRange = document.getElementById('divRange');

  let isProcessing = false;
  let quizRunning = false;
  let wakeLock = null;
  let recognition = null;
  let synth = window.speechSynthesis;

  // 1. 安全性检查 (最关键的部分)
  function checkSecurity() {
    if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
      statusBox.innerHTML = '🚨 安全限制<br>请使用 HTTPS 访问或直接使用华为浏览器打开 GitHub Pages 原站';
      console.warn('非安全上下文，无法使用麦克风');
      return false;
    }
    return true;
  }

  // 2. 屏幕常亮处理
  async function requestWakeLock() {
    if ('wakeLock' in navigator) {
      try {
        wakeLock = await navigator.wakeLock.request('screen');
      } catch (err) { console.log(err); }
    }
  }

  // 3. 语音播报优化
  function speak(text, callback, rate = 0.9, pitch = 1.0) {
    if (!synth) { if (callback) callback(); return; }
    synth.cancel();
    setTimeout(() => {
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'zh-CN';
      utter.rate = rate;
      utter.pitch = pitch;
      utter.onend = () => { setTimeout(() => { if (callback) callback(); }, 200); };
      synth.speak(utter);
    }, 100);
  }

  // 4. 核心：语音识别启动 (去掉了严格的预检，直接尝试)
  function startListening(onResult, onTimeout, timeoutMs) {
    // 直接检查 HTTPS
    if (!checkSecurity()) return;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      statusBox.innerText = '❌ 浏览器不支持，请使用 Chrome 或 华为浏览器';
      return;
    }

    // 强制清理上一次的实例
    if (recognition) {
      try { recognition.stop(); } catch(e) {}
      recognition = null;
    }

    setTimeout(() => {
      try {
        recognition = new SpeechRecognition();
        recognition.lang = 'zh-CN';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        
        // 华为/安卓优化：必须设置连续模式并手动控制停止，否则只听一次就结束
        recognition.continuous = true; 

        let timeoutId = setTimeout(() => {
          if (recognition) {
            try { recognition.stop(); } catch(e) {}
            recognition = null;
          }
          if (onTimeout) onTimeout();
        }, timeoutMs);

        recognition.onresult = (event) => {
          clearTimeout(timeoutId);
          // 只取最后一个结果（最新说的）
          const transcript = event.results[event.results.length - 1][0].transcript.trim();
          console.log('听到了:', transcript);
          
          // 尝试提取数字
          const match = transcript.match(/\d+/);
          if (match) {
            onResult(parseInt(match[0], 10));
          } else {
            // 如果没提取到数字，但用户说了“睡觉”之类的词，也触发结束
            if (transcript.includes('睡觉') || transcript.includes('不玩') || transcript.includes('晚安')) {
              handleUserRequestExit();
            }
          }
        };

        recognition.onerror = (event) => {
          clearTimeout(timeoutId);
          console.error('录音错误:', event.error);
          // 常见错误提示
          if (event.error === 'not-allowed') {
            statusBox.innerHTML = '🎤 麦克风被拒绝<br>请点击地址栏左侧锁头图标，检查权限';
          } else if (event.error === 'no-speech') {
            onTimeout && onTimeout(); // 没声音超时
          } else {
            statusBox.innerText = '🎤 录音出错: ' + event.error;
          }
        };

        recognition.onend = () => {
          // 如果是手动 stop 的，recognition 还在；如果是异常结束，这里清理
          if (recognition && !recognition.continuous) {
            recognition = null;
          }
        };

        recognition.start();
        statusBox.innerText = '👂 正在听... (请说话)';
        
      } catch (e) {
        console.error('启动失败:', e);
        statusBox.innerText = '无法启动录音: ' + e.message;
      }
    }, 500); // 延迟启动，避免点击过快
  }

  // 5. 退出处理
  function handleUserRequestExit() {
    speak('好的，晚安，做个好梦。', () => {
      window.close(); // 尝试关闭
    });
  }

  // 6. 生成题目 (保持原逻辑)
  function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }
  
  function getRangeValue(container) {
    const active = container.querySelector('.active');
    return active ? active.dataset.value : 'mixed';
  }
  
  function generateQuestion() {
    const ops = ['+', '-', '*', '/'];
    const op = ops[rand(0, 3)];
    let a, b, answer, textOp;
    let rangeSetting;

    switch (op) {
      case '+': rangeSetting = getRangeValue(addRange); textOp = '加'; break;
      case '-': rangeSetting = getRangeValue(subRange); textOp = '减'; break;
      case '*': rangeSetting = getRangeValue(mulRange); textOp = '乘'; break;
      case '/': rangeSetting = getRangeValue(divRange); textOp = '除以'; break;
    }

    // 数字生成逻辑
    switch (rangeSetting) {
      case 'single': a = rand(1, 9); b = rand(1, 9); break;
      case 'double': a = rand(10, 99); b = rand(10, 99); break;
      default: a = rand(1, 99); b = rand(1, 99);
    }

    switch (op) {
      case '+': answer = a + b; break;
      case '-': if (a < b) [a, b] = [b, a]; answer = a - b; break;
      case '*': 
        if (rangeSetting === 'single') { a = rand(1,9); b=rand(1,9); }
        else if (rangeSetting === 'mixed') { a=rand(1,20); b=rand(1,20); }
        else { a=rand(10,30); b=rand(10,30); }
        answer = a * b; 
        break;
      case '/': 
        if (rangeSetting === 'single') { b=rand(1,9); answer=rand(1,9); }
        else if (rangeSetting === 'mixed') { b=rand(1,20); answer=rand(1,20); }
        else { b=rand(10,30); answer=rand(10,30); }
        a = b * answer; 
        break;
    }
    return { text: `${a} ${textOp} ${b} 等于多少？`, answer };
  }

  // 7. 主流程控制
  let currentAnswer = null;

  function nextQuestion() {
    if (!quizRunning) return;
    const q = generateQuestion();
    currentAnswer = q.answer;
    statusBox.innerText = q.text;
    speak(q.text, () => {
      const waitTime = (parseInt(waitFirstInput.value) || 15) * 1000;
      startListening(
        (num) => {
          // 检查答案
          if (num === currentAnswer) {
            speak('对啦，下一题', nextQuestion);
          } else {
            speak(`不对哦，答案是${currentAnswer}。咱们继续`, nextQuestion);
          }
        },
        () => { 
          // 超时，询问是否睡着
          speak('还在听吗？', () => {
            // 再给一次机会
            startListening(
              (num) => { /* 忽略 */ },
              () => { quizRunning = false; speak('那我就不打扰啦，晚安'); },
              5000
            );
          });
        },
        waitTime
      );
    });
  }

  // 8. 按钮事件
  startBtn.addEventListener('click', () => {
    if (quizRunning) return;
    if (!checkSecurity()) return;
    
    quizRunning = true;
    statusBox.innerText = '准备开始...';
    speak('开始啦，答对了继续哦', nextQuestion);
    requestWakeLock();
  });

  stopBtn.addEventListener('click', () => {
    handleUserRequestExit();
  });

  // 页面加载
  window.addEventListener('load', () => {
    // 提示用户点击屏幕任意处激活音频（安卓常见问题）
    document.body.addEventListener('touchstart', function activateAudio() {
      document.body.removeEventListener('touchstart', activateAudio);
    }, false);
  });

})();
</script>
</body>
</html>
